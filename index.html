<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi To-Do List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #1a1a1a;
    }

    .add-task {
      display: flex;
      gap: 8px;
      max-width: 500px;
      margin: 0 auto 2.5rem;
    }

    .add-task input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d0cfc8;
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
      outline: none;
    }

    .add-task input:focus { border-color: #7f77dd; }

    .add-task button {
      padding: 10px 18px;
      background: #534ab7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    .add-task button:hover { background: #3c3489; }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    .column {
      background: #fff;
      border: 0.5px solid #d0cfc8;
      border-radius: 12px;
      padding: 1rem;
      min-height: 300px;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .column-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .col-todo   .column-title { color: #5f5e5a; }
    .col-doing  .column-title { color: #185fa5; }
    .col-done   .column-title { color: #0f6e56; }

    .count {
      font-size: 12px;
      font-weight: 500;
      border-radius: 99px;
      padding: 2px 8px;
    }

    .col-todo  .count { background: #f1efe8; color: #5f5e5a; }
    .col-doing .count { background: #e6f1fb; color: #185fa5; }
    .col-done  .count { background: #e1f5ee; color: #0f6e56; }

    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .task {
      background: #fafaf8;
      border: 0.5px solid #d0cfc8;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .task-text { flex: 1; line-height: 1.4; word-break: break-word; }

    .task-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .task-actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      padding: 2px 5px;
      border-radius: 4px;
      color: #888780;
    }

    .task-actions button:hover { background: #f1efe8; color: #1a1a1a; }

    .btn-prev { display: none; }
    .col-doing .btn-prev,
    .col-done  .btn-prev { display: inline; }

    .btn-next { display: none; }
    .col-todo  .btn-next,
    .col-doing .btn-next { display: inline; }

    .empty {
      font-size: 13px;
      color: #b4b2a9;
      text-align: center;
      padding: 1.5rem 0;
    }
  </style>
</head>
<body>

<h1>Mi To-Do List</h1>

<div class="add-task">
  <input type="text" id="new-task" placeholder="Escribe una tarea y presiona Agregar..." />
  <button onclick="addTask()">Agregar</button>
</div>

<div class="board">
  <div class="column col-todo">
    <div class="column-header">
      <span class="column-title">Por hacer</span>
      <span class="count" id="count-todo">0</span>
    </div>
    <div class="task-list" id="list-todo"></div>
  </div>

  <div class="column col-doing">
    <div class="column-header">
      <span class="column-title">En progreso</span>
      <span class="count" id="count-doing">0</span>
    </div>
    <div class="task-list" id="list-doing"></div>
  </div>

  <div class="column col-done">
    <div class="column-header">
      <span class="column-title">Hecho</span>
      <span class="count" id="count-done">0</span>
    </div>
    <div class="task-list" id="list-done"></div>
  </div>
</div>

<script>
  const STATES = ['todo', 'doing', 'done'];

  function load() {
    return JSON.parse(localStorage.getItem('tasks') || '[]');
  }

  function save(tasks) {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function render() {
    const tasks = load();
    STATES.forEach(state => {
      const list = document.getElementById('list-' + state);
      const count = document.getElementById('count-' + state);
      const items = tasks.filter(t => t.state === state);
      count.textContent = items.length;
      if (items.length === 0) {
        list.innerHTML = '<div class="empty">Sin tareas</div>';
        return;
      }
      list.innerHTML = items.map(t => `
        <div class="task">
          <span class="task-text">${escape(t.text)}</span>
          <div class="task-actions">
            <button class="btn-prev" onclick="move('${t.id}', -1)" title="Retroceder">&#8592;</button>
            <button class="btn-next" onclick="move('${t.id}', 1)" title="Avanzar">&#8594;</button>
            <button onclick="remove('${t.id}')" title="Eliminar">&#10005;</button>
          </div>
        </div>
      `).join('');
    });
  }

  function escape(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addTask() {
    const input = document.getElementById('new-task');
    const text = input.value.trim();
    if (!text) return;
    const tasks = load();
    tasks.push({ id: Date.now().toString(), text, state: 'todo' });
    save(tasks);
    input.value = '';
    render();
  }

  function move(id, dir) {
    const tasks = load();
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    const idx = STATES.indexOf(t.state);
    const next = idx + dir;
    if (next < 0 || next >= STATES.length) return;
    t.state = STATES[next];
    save(tasks);
    render();
  }

  function remove(id) {
    save(load().filter(t => t.id !== id));
    render();
  }

  document.getElementById('new-task').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
