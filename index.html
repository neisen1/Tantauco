<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi To-Do List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #1a1a1a;
    }

    .add-task {
      display: flex;
      gap: 8px;
      max-width: 560px;
      margin: 0 auto 2.5rem;
      flex-wrap: wrap;
    }

    .add-task input[type="text"] {
      flex: 1;
      min-width: 160px;
      padding: 10px 14px;
      border: 1px solid #d0cfc8;
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
      outline: none;
    }

    .add-task input[type="text"]:focus { border-color: #7f77dd; }

    .priority-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid #d0cfc8;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      color: #5f5e5a;
    }

    .priority-wrap input[type="number"] {
      width: 42px;
      border: none;
      outline: none;
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      background: transparent;
      text-align: center;
    }

    .add-task button {
      padding: 10px 18px;
      background: #534ab7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
    }

    .add-task button:hover { background: #3c3489; }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    .column {
      background: #fff;
      border: 0.5px solid #d0cfc8;
      border-radius: 12px;
      padding: 1rem;
      min-height: 300px;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .column-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .col-todo   .column-title { color: #5f5e5a; }
    .col-doing  .column-title { color: #185fa5; }
    .col-done   .column-title { color: #0f6e56; }

    .count {
      font-size: 12px;
      font-weight: 500;
      border-radius: 99px;
      padding: 2px 8px;
    }

    .col-todo  .count { background: #f1efe8; color: #5f5e5a; }
    .col-doing .count { background: #e6f1fb; color: #185fa5; }
    .col-done  .count { background: #e1f5ee; color: #0f6e56; }

    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .task {
      background: #fafaf8;
      border: 0.5px solid #d0cfc8;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .priority-badge {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      line-height: 1;
    }

    .p-high { background: #faeeda; color: #633806; }
    .p-mid  { background: #e6f1fb; color: #0c447c; }
    .p-low  { background: #f1efe8; color: #444441; }

    .priority-editor {
      display: none;
      flex-direction: column;
      gap: 4px;
      background: #fff;
      border: 1px solid #d0cfc8;
      border-radius: 8px;
      padding: 8px;
      position: absolute;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .priority-editor.open { display: flex; }

    .priority-editor input[type="range"] {
      width: 120px;
      accent-color: #534ab7;
    }

    .priority-editor .pe-label {
      font-size: 11px;
      color: #888780;
      text-align: center;
    }

    .task-body { flex: 1; min-width: 0; position: relative; }

    .task-text { line-height: 1.4; word-break: break-word; }

    .col-done .task-text {
      text-decoration: line-through;
      color: #b4b2a9;
    }

    .task-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .task-actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      padding: 2px 5px;
      border-radius: 4px;
      color: #888780;
    }

    .task-actions button:hover { background: #f1efe8; color: #1a1a1a; }

    .btn-prev { display: none; }
    .col-doing .btn-prev,
    .col-done  .btn-prev { display: inline; }

    .btn-next { display: none; }
    .col-todo  .btn-next,
    .col-doing .btn-next { display: inline; }

    .empty {
      font-size: 13px;
      color: #b4b2a9;
      text-align: center;
      padding: 1.5rem 0;
    }
  </style>
</head>
<body>

<h1>Mi To-Do List</h1>

<div class="add-task">
  <input type="text" id="new-task" placeholder="Escribe una nueva tarea..." />
  <div class="priority-wrap">
    <span>Prioridad</span>
    <input type="number" id="new-priority" value="5" min="1" max="10" />
    <span style="color:#b4b2a9">/10</span>
  </div>
  <button onclick="addTask()">Agregar</button>
</div>

<div class="board">
  <div class="column col-todo">
    <div class="column-header">
      <span class="column-title">Por hacer</span>
      <span class="count" id="count-todo">0</span>
    </div>
    <div class="task-list" id="list-todo"></div>
  </div>

  <div class="column col-doing">
    <div class="column-header">
      <span class="column-title">En progreso</span>
      <span class="count" id="count-doing">0</span>
    </div>
    <div class="task-list" id="list-doing"></div>
  </div>

  <div class="column col-done">
    <div class="column-header">
      <span class="column-title">Hecho</span>
      <span class="count" id="count-done">0</span>
    </div>
    <div class="task-list" id="list-done"></div>
  </div>
</div>

<script>
  const STATES = ['todo', 'doing', 'done'];

  function load() {
    return JSON.parse(localStorage.getItem('tasks') || '[]');
  }

  function save(tasks) {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function priorityClass(p) {
    if (p >= 8) return 'p-high';
    if (p >= 4) return 'p-mid';
    return 'p-low';
  }

  function sortItems(items, state) {
    if (state === 'done') return items;
    return [...items].sort((a, b) => (b.priority || 5) - (a.priority || 5));
  }

  function render() {
    const tasks = load();
    STATES.forEach(state => {
      const list = document.getElementById('list-' + state);
      const count = document.getElementById('count-' + state);
      const raw = tasks.filter(t => t.state === state);
      const items = sortItems(raw, state);
      count.textContent = items.length;
      if (items.length === 0) {
        list.innerHTML = '<div class="empty">Sin tareas</div>';
        return;
      }
      list.innerHTML = items.map(t => {
        const p = t.priority || 5;
        const cls = priorityClass(p);
        return `
          <div class="task" id="task-${t.id}">
            <div class="task-body">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                <button class="priority-badge ${cls}" onclick="toggleEditor('${t.id}')" title="Cambiar prioridad">${p}</button>
                <div class="priority-editor" id="editor-${t.id}">
                  <input type="range" min="1" max="10" value="${p}"
                    oninput="updatePriority('${t.id}', this.value)"
                    onchange="updatePriority('${t.id}', this.value)" />
                  <span class="pe-label" id="pe-label-${t.id}">Prioridad: ${p}</span>
                </div>
              </div>
              <span class="task-text">${esc(t.text)}</span>
            </div>
            <div class="task-actions">
              <button class="btn-prev" onclick="move('${t.id}', -1)" title="Retroceder">&#8592;</button>
              <button class="btn-next" onclick="move('${t.id}', 1)" title="Avanzar">&#8594;</button>
              <button onclick="remove('${t.id}')" title="Eliminar">&#10005;</button>
            </div>
          </div>`;
      }).join('');
    });
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addTask() {
    const input = document.getElementById('new-task');
    const text = input.value.trim();
    if (!text) return;
    const priority = parseInt(document.getElementById('new-priority').value) || 5;
    const tasks = load();
    tasks.push({ id: Date.now().toString(), text, state: 'todo', priority: Math.min(10, Math.max(1, priority)) });
    save(tasks);
    input.value = '';
    render();
  }

  function move(id, dir) {
    const tasks = load();
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    const next = STATES.indexOf(t.state) + dir;
    if (next < 0 || next >= STATES.length) return;
    t.state = STATES[next];
    save(tasks);
    render();
  }

  function remove(id) {
    save(load().filter(t => t.id !== id));
    render();
  }

  function toggleEditor(id) {
    const el = document.getElementById('editor-' + id);
    el.classList.toggle('open');
    document.addEventListener('click', function outsideClick(e) {
      if (!document.getElementById('task-' + id)?.contains(e.target)) {
        el.classList.remove('open');
        document.removeEventListener('click', outsideClick);
      }
    });
  }

  function updatePriority(id, val) {
    const p = parseInt(val);
    const tasks = load();
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.priority = p;
    save(tasks);
    const label = document.getElementById('pe-label-' + id);
    if (label) label.textContent = 'Prioridad: ' + p;
    const badge = document.querySelector('#task-' + id + ' .priority-badge');
    if (badge) {
      badge.textContent = p;
      badge.className = 'priority-badge ' + priorityClass(p);
    }
  }

  document.getElementById('new-task').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  document.getElementById('new-priority').addEventListener('input', function() {
    let v = parseInt(this.value);
    if (isNaN(v)) return;
    this.value = Math.min(10, Math.max(1, v));
  });

  render();
</script>
</body>
</html>
